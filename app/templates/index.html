<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> bb.dd </title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="dashboard-container">
        <header>
            <div class="logo-container">
                <img src="{{ url_for('static', filename='fotos/TriageHelper.banner.jpg') }}" alt="Logotipo" class="logo">
            </div>
            <div class="doctor-info">
                <h3>Bienvenido, Dr. {{ doctor_name }}</h3>
                <p>Sesión Iniciada</p>
            </div>
        </header>

        <div class="main-content">
            <div class="sorting-container">
                <h4>Ordenar pacientes por gravedad</h4>
                <select>
                    <option value="leve">Leve</option>
                    <option value="moderado">Moderado</option>
                    <option value="grave">Grave</option>
                </select>
            </div>

            <div class="patient-form-container">
                <h4>Agregar nuevo paciente</h4>
                <form action="/add_patient" method="POST">
                    <input type="text" name="name" placeholder="Nombre del paciente" required>
                    <input type="number" name="id" placeholder="ID del paciente" required>
                    <input type="text" name="symptoms" placeholder="Síntomas" required>
                    <button type="submit">Agregar Paciente</button>
                </form>
            </div>

            <div class="symptom-search-container">
                <h4>Buscar síntomas</h4>
                <input type="text" id="symptom-search" placeholder="Buscar síntomas...">
                <ul id="symptom-results"></ul>
            </div>

            <div class="patients-list">
                <h4>Lista de pacientes</h4>
                <ul>
                    <li>Paciente 1 - Gravedad: Leve</li>
                    <li>Paciente 2 - Gravedad: Moderado</li>
                    <li>Paciente 3 - Gravedad: Grave</li>
                </ul>
            </div>
        </div>
    </div>
</body>
</html>
