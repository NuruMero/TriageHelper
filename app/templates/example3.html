<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Hospitalario</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f0f8ff;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            grid-column: 1 / -1;
            text-align: center;
            color: #2c3e50;
            padding: 20px;
            background-color: #e6f3ff;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .patient-list {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .patient-item {
            padding: 15px;
            margin: 10px 0;
            background-color: #f8f9fa;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .patient-item:hover {
            background-color: #e9ecef;
            transform: translateX(5px);
        }

        .patient-item.selected {
            background-color: #cce5ff;
            border-left: 4px solid #007bff;
        }

        .severity {
            padding: 5px 10px;
            border-radius: 15px;
            font-weight: bold;
        }

        button {
            padding: 8px 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Dr. Pedro Jiménez Díaz</h1>
            <h3>Traumatología</h3>
        </div>

        <div class="patient-list">
            <div class="controls">
                <h2>Lista de Pacientes</h2>
                <button id="sortButton">Ordenar por Gravedad</button>
            </div>
            <div id="patientsContainer"></div>
        </div>
    </div>

    <script>
        // Datos de ejemplo
        const patients = [
            { 
                name: "María López García",
                age: 35,
                severity: 3,
                diagnosis: "Fractura de fémur",
                admitted: true
            },
            {
                name: "Carlos Martínez Ruiz",
                age: 28,
                severity: 4,
                diagnosis: "Luxación de hombro",
                admitted: true
            },
            {
                name: "Ana Sánchez Gómez",
                age: 67,
                severity: 2,
                diagnosis: "Esguince de tobillo",
                admitted: false
            }
        ];

        let currentSort = 'desc';
        let selectedPatient = null;

        function renderPatients() {
            const container = document.getElementById('patientsContainer');
            container.innerHTML = '';
            
            patients.sort((a, b) => currentSort === 'desc' ? b.severity - a.severity : a.severity - b.severity)
                    .forEach(patient => {
                const patientElement = document.createElement('div');
                patientElement.className = `patient-item ${selectedPatient === patient ? 'selected' : ''}`;
                patientElement.innerHTML = `
                    <div>
                        <h3>${patient.name}</h3>
                        <p>${patient.diagnosis} - ${patient.admitted ? 'Ingresado' : 'Alta médica'}</p>
                    </div>
                    <div class="severity" style="background-color: ${getSeverityColor(patient.severity)}">
                        Gravedad ${patient.severity}
                    </div>
                `;
                
                patientElement.addEventListener('click', () => {
                    selectedPatient = patient;
                    renderPatients();
                });
                
                container.appendChild(patientElement);
            });
        }

        function getSeverityColor(severity) {
            const colors = ['#28a745', '#ffc107', '#fd7e14', '#dc3545', '#6c757d'];
            return colors[severity - 1];
        }

        document.getElementById('sortButton').addEventListener('click', () => {
            currentSort = currentSort === 'desc' ? 'asc' : 'desc';
            renderPatients();
        });

        // Carga inicial
        renderPatients();
    </script>
</body>
</html>
